# bench/fixture.yaml — realistic CI/CD configuration for benchmarking
#
# Designed to exercise block scalars, nested mappings, and quoted values —
# the constructs most common in real-world CI/CD config files.

project:
  name: benchmark-service
  version: 2.5.0
  language: go
  description: >
    A sample microservice used as a benchmark fixture
    for yamlget performance comparisons.

build:
  image: golang:1.22-alpine
  os: linux
  arch: amd64
  cache:
    enabled: true
    key: go-modules-v2
    paths: vendor
  env:
    CGO_ENABLED: "0"
    GOFLAGS: "-mod=vendor"
  script: |
    go vet ./...
    go build -o /bin/service ./cmd/service

test:
  image: golang:1.22-alpine
  coverage:
    enabled: true
    threshold: 85
    report: coverage.out
  script: |
    go test -race -count=1 -coverprofile=coverage.out ./...
    go tool cover -func=coverage.out

lint:
  tool: golangci-lint
  version: v1.57.2
  config: .golangci.yml
  timeout: 5m

security:
  scanner: trivy
  severity: HIGH,CRITICAL
  exit_code: 1
  ignore_unfixed: false

docker:
  registry: ghcr.io
  image: ghcr.io/example/benchmark-service
  tag: 2.5.0
  platforms: linux/amd64,linux/arm64
  build_args:
    VERSION: 2.5.0
    COMMIT: "$(git rev-parse --short HEAD)"
  labels:
    org.opencontainers.image.title: benchmark-service
    org.opencontainers.image.version: 2.5.0

deploy:
  environment: production
  replicas: 10
  strategy: rolling
  rolling_update:
    max_surge: 2
    max_unavailable: 0
  health_check:
    path: /healthz
    port: 8080
    initial_delay: 15
    period: 10
    timeout: 5
    failure_threshold: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: true
  port: 9090
  path: /metrics
  requests:
    total: benchmark_http_requests_total
    duration: benchmark_http_request_duration_seconds
    errors: benchmark_http_request_errors_total

notifications:
  slack:
    enabled: true
    channel: "#deployments"
    on_success: false
    on_failure: true
  email:
    enabled: false
    recipients: team@example.com

database:
  host: postgres.internal
  port: 5432
  name: benchmark_db
  pool:
    min: 2
    max: 20
    idle_timeout: 300s
  credentials:
    username: svc_benchmark
    password: "s3cr3t-from-vault"

cache:
  backend: redis
  host: redis.internal
  port: 6379
  db: 0
  ttl: 3600
  key_prefix: benchmark

logging:
  level: info
  format: json
  output:
    stdout: true
    file: /var/log/service.log
    rotate: true
    max_size: 100
    max_backups: 5
