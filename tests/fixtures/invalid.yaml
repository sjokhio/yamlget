# invalid.yaml — YAML with block sequences used for sequence-related tests.
#
# In v0.2.0 block sequences are valid. Behavior:
#   - "items[0]"    -> exit 0 ("first item")
#   - "items.child" -> exit 1 (no "child" mapping key; sequence on path, no index)
#   - "nonexistent" -> exit 1 (key not found; sequences off-path are skipped)

items:
  - first item
  - second item
  - third item
