# invalid.yaml — YAML that uses sequences, which yamlget does not support.
#
# Any query against this file must produce exit code 4 (YAMLGET_EXIT_PARSE_ERROR)
# because the sequence items below are not mapping entries and the lexer will
# classify them as INVALID.

items:
  - first item
  - second item
  - third item
name: this line is never reached
