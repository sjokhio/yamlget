name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# `make test` runs lexer unit tests + integration tests (M3+).

jobs:
  # ── Linux ─────────────────────────────────────────────────────────────────
  linux-gcc:
    name: Linux / gcc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make CC=gcc CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        run: make test CC=gcc CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

  linux-clang:
    name: Linux / clang
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get install -y clang

      - name: Build
        run: make CC=clang CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        run: make test CC=clang CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

  linux-gcc-asan:
    name: Linux / gcc / ASan+UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test with sanitizers
        run: |
          make asan-test CC=gcc \
            CFLAGS="-std=c99 -Wall -Wextra -g -fsanitize=address,undefined -O1"

  # ── macOS ──────────────────────────────────────────────────────────────────
  macos-clang:
    name: macOS / clang (Xcode)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make CC=clang CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        run: make test CC=clang CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

  # ── Windows ────────────────────────────────────────────────────────────────
  windows-msvc:
    name: Windows / MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build main binary
        shell: cmd
        run: |
          cl /nologo /W4 /WX /O2 /std:c17 /D_CRT_SECURE_NO_WARNINGS ^
             /Fe:yamlget.exe /Iinclude ^
             src\main.c src\lexer.c src\parser.c

      - name: Build lexer test binary
        shell: cmd
        run: |
          cl /nologo /W4 /WX /O2 /std:c17 /D_CRT_SECURE_NO_WARNINGS ^
             /Fe:tests\lexer\test_lexer.exe /Iinclude ^
             tests\lexer\test_lexer.c src\lexer.c

      - name: Test (lexer — Windows PowerShell runner)
        shell: pwsh
        run: |
          $pass = 0; $fail = 0
          Get-ChildItem tests\lexer\fixtures\*.expected | ForEach-Object {
            $base     = $_.FullName -replace '\.expected$', ''
            $yamlFile = "$base.yaml"
            $name     = [System.IO.Path]::GetFileNameWithoutExtension($base)
            if (-not (Test-Path $yamlFile)) {
              Write-Host "WARN  $name : no matching .yaml"
              return
            }
            $actual   = & .\tests\lexer\test_lexer.exe $yamlFile 2>$null
            $expected = Get-Content $_.FullName -Raw
            $actual   = ($actual -join "`n").TrimEnd()
            $expected = $expected.TrimEnd("`r", "`n")
            if ($actual -eq $expected) {
              Write-Host "PASS  $name"; $pass++
            } else {
              Write-Host "FAIL  $name"
              Write-Host "  Expected: $expected"
              Write-Host "  Actual:   $actual"
              $fail++
            }
          }
          Write-Host "Results: $pass passed, $fail failed"
          if ($fail -gt 0) { exit 1 }

      - name: Test (integration — Windows PowerShell runner)
        shell: pwsh
        run: |
          $pass = 0; $fail = 0
          $bin = ".\yamlget.exe"
          $fx  = "tests\fixtures"

          function Check {
            param($desc, $expectExit, $expectOut, [string[]]$args)
            $actual = & $bin @args 2>$null
            $code   = $LASTEXITCODE
            if ($code -ne $expectExit) {
              Write-Host "FAIL  $desc (exit $code, want $expectExit)"
              $script:fail++; return
            }
            if ($expectOut -ne $null -and $actual -ne $expectOut) {
              Write-Host "FAIL  $desc (output '$actual', want '$expectOut')"
              $script:fail++; return
            }
            Write-Host "PASS  $desc"; $script:pass++
          }

          Check "--version" 0 "0.1.0" @("--version")
          Check "no args → 2"    2 $null @()
          Check "missing file → 3" 3 $null @("/nonexistent/file.yaml", "key")
          Check "app.name"       0 "myservice"   @("$fx\nested.yaml", "app.name")
          Check "database.port"  0 "5432"        @("$fx\nested.yaml", "database.port")
          Check "3-level path"   0 "admin"       @("$fx\nested.yaml", "database.credentials.username")
          Check "not found → 1"  1 $null         @("$fx\nested.yaml", "nonexistent")
          Check "invalid → 4"    4 $null         @("$fx\invalid.yaml", "name")

          Write-Host "Results: $pass passed, $fail failed"
          if ($fail -gt 0) { exit 1 }

  windows-mingw:
    name: Windows / MinGW (gcc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: make CC=gcc CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        shell: bash
        run: make test CC=gcc CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"
