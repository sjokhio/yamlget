name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Linux ────────────────────────────────────────────────────────────────
  linux-gcc:
    name: Linux / gcc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make CC=gcc CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        run: make test

  linux-clang:
    name: Linux / clang
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get install -y clang

      - name: Build
        run: make CC=clang CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        run: make test

  linux-gcc-asan:
    name: Linux / gcc / ASan+UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with sanitizers
        run: make CC=gcc CFLAGS="-std=c99 -Wall -Wextra -g -fsanitize=address,undefined -O1"

      - name: Test
        run: make test

  # ── macOS ────────────────────────────────────────────────────────────────
  macos-clang:
    name: macOS / clang (Xcode)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make CC=clang CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        run: make test

  # ── Windows ──────────────────────────────────────────────────────────────
  windows-msvc:
    name: Windows / MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: cmd
        run: |
          cl /nologo /W4 /WX /O2 /std:c17 /Fe:yamlget.exe /Iinclude src\main.c

      - name: Test
        shell: pwsh
        run: |
          if (Test-Path "tests\run_tests.ps1") {
            & tests\run_tests.ps1
          } else {
            Write-Host "No Windows test runner yet — skipping"
          }

  windows-mingw:
    name: Windows / MinGW (gcc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: make CC=gcc CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -Werror"

      - name: Test
        shell: bash
        run: make test
